<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kickenut - Stop unwanted subscriptions instantly</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #121212;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .container {
      width: 90%;
      max-width: 720px;
      padding: 30px;
    }

    h1 {
      font-size: 64px;
      margin-bottom: 10px;
    }

    p {
      color: #cccccc;
      font-size: 18px;
    }

    .search-box {
      display: flex;
      gap: 10px;
      background: white;
      padding: 15px;
      border-radius: 14px;
      margin-top: 30px;
    }

    input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 18px;
      padding: 12px;
    }

    button {
      border: none;
      background: #ffcc00;
      color: #121212;
      font-size: 18px;
      font-weight: bold;
      padding: 12px 22px;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #ffd633;
    }

    .message {
      margin-top: 25px;
      color: #cccccc;
      font-size: 16px;
    }

    .ads {
      margin-top: 45px;
      display: grid;
      gap: 16px;
    }

    .ad-box {
      border: 1px dashed #555;
      border-radius: 12px;
      padding: 20px;
      color: #888;
      font-size: 14px;
      min-height: 70px;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 44px;
      }

      .search-box {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Kickenut</h1>
    <p>Stop unwanted subscriptions instantly.</p>

    <div class="search-box">
      <input
        id="searchInput"
        type="text"
        placeholder="Enter a subscription, e.g. Netflix"
        onkeydown="handleEnter(event)"
      />
      <button onclick="searchSubscription()">Search</button>
    </div>

    <div class="message" id="message">
      After cancelling, come back and search for another subscription anytime.
    </div>

    <div class="ads">
      <div class="ad-box">Google AdSense ad slot</div>
      <div class="ad-box">Media.net ad slot</div>
      <div class="ad-box">PropellerAds ad slot</div>
    </div>
  </div>

  <script>
    function handleEnter(event) {
      if (event.key === "Enter") {
        searchSubscription();
      }
    }

    async function searchSubscription() {
      const input = document.getElementById("searchInput");
      const message = document.getElementById("message");
      const query = input.value.trim();

      if (!query) {
        message.textContent = "Please enter a subscription name.";
        return;
      }

      message.textContent = "Finding the best official cancellation page...";

      try {
        const response = await fetch(`/search?q=${encodeURIComponent(query)}`);
        const data = await response.json();

        if (data.link) {
          window.location.href = data.link;
        } else {
          message.textContent = "No official cancellation page found. Please try another search.";
        }
      } catch (error) {
        message.textContent = "Something went wrong. Please try again.";
      }
    }
  </script>
</body>
</html>
